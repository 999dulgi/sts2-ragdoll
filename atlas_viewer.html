<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spine Atlas Viewer</title>
<style>
  body { margin: 0; background: #1a1a1a; color: #eee; font-family: monospace; display: flex; flex-direction: column; height: 100vh; }
  #toolbar { padding: 10px; background: #2a2a2a; display: flex; gap: 10px; align-items: center; flex-shrink: 0; }
  #toolbar label { cursor: pointer; background: #444; padding: 6px 12px; border-radius: 4px; }
  #toolbar label:hover { background: #555; }
  #toolbar input[type=file] { display: none; }
  #status { color: #aaa; font-size: 12px; }
  #main { display: flex; flex: 1; overflow: hidden; }
  #canvas-wrap { flex: 1; overflow: auto; padding: 16px; }
  canvas { display: block; cursor: crosshair; }
  #sidebar { width: 220px; background: #222; overflow-y: auto; padding: 8px; flex-shrink: 0; }
  .region-item { padding: 4px 8px; border-radius: 3px; cursor: pointer; font-size: 12px; margin-bottom: 2px; }
  .region-item:hover { background: #444; }
  .region-item.active { background: #2a6; color: #fff; }
  #tooltip { position: fixed; background: rgba(0,0,0,0.8); color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 12px; pointer-events: none; display: none; }
</style>
</head>
<body>
<div id="toolbar">
  <label>📄 파일 선택 (.atlas + .png 동시 선택 가능) <input type="file" id="fileInput" multiple accept=".atlas,.txt,image/png"></label>
  <span id="status">atlas 파일을 선택하세요</span>
</div>
<div id="main">
  <div id="canvas-wrap"><canvas id="canvas"></canvas></div>
  <div id="sidebar" id="regionList"></div>
</div>
<div id="tooltip"></div>

<script>
let regions = [];
let img = null;
let atlasLoaded = false;
let imgLoaded = false;
let hoveredRegion = null;
let selectedRegion = null;
const COLORS = ['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22','#e91e63','#00bcd4','#8bc34a'];

document.getElementById('fileInput').addEventListener('change', e => {
  const files = Array.from(e.target.files);
  const atlasFile = files.find(f => f.name.endsWith('.atlas') || f.name.endsWith('.txt'));
  const baseName = atlasFile ? atlasFile.name.replace(/\.[^.]+$/, '') : null;
  const pngFile = files.find(f => f.name.endsWith('.png') && (!baseName || f.name.startsWith(baseName)));

  if (atlasFile) {
    const reader = new FileReader();
    reader.onload = ev => { parseAtlas(ev.target.result); atlasLoaded = true; tryRender(); };
    reader.readAsText(atlasFile);
  }

  if (pngFile) {
    const url = URL.createObjectURL(pngFile);
    img = new Image();
    img.onload = () => { imgLoaded = true; tryRender(); };
    img.src = url;
  } else if (atlasFile) {
    document.getElementById('status').textContent = 'PNG를 찾지 못했습니다. PNG도 같이 선택해주세요.';
  }
});

function parseAtlas(text) {
  regions = [];
  const lines = text.split(/\r?\n/);
  let i = 0;
  // skip to first region (past header)
  while (i < lines.length && (lines[i].trim() === '' || !lines[i].includes(':'))) i++;
  while (i < lines.length && lines[i].includes(':')) i++;

  while (i < lines.length) {
    const name = lines[i].trim();
    i++;
    if (!name || name.includes(':')) continue;

    let bounds = null, rotated = false;
    while (i < lines.length && lines[i].includes(':')) {
      const prop = lines[i].trim();
      if (prop.startsWith('bounds:')) {
        const p = prop.substring(7).split(',').map(s => parseInt(s.trim()));
        bounds = { x: p[0], y: p[1], w: p[2], h: p[3] };
      } else if (prop.startsWith('rotate:')) {
        const v = prop.substring(7).trim();
        rotated = v !== 'false' && v !== '0';
      }
      i++;
    }
    if (bounds) regions.push({ name, bounds, rotated });
  }

  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = '<div style="font-size:11px;color:#888;margin-bottom:6px;">Regions (' + regions.length + ')</div>';
  regions.forEach((r, idx) => {
    const el = document.createElement('div');
    el.className = 'region-item';
    el.style.borderLeft = '3px solid ' + COLORS[idx % COLORS.length];
    el.textContent = r.name;
    el.addEventListener('click', () => { selectedRegion = selectedRegion === r ? null : r; render(); updateSidebarActive(); });
    el.dataset.idx = idx;
    sidebar.appendChild(el);
  });

  document.getElementById('status').textContent = regions.length + ' regions loaded';
}

function updateSidebarActive() {
  document.querySelectorAll('.region-item').forEach(el => {
    el.classList.toggle('active', regions[el.dataset.idx] === selectedRegion);
  });
}

function tryRender() {
  if (atlasLoaded && imgLoaded) render();
}

function render() {
  if (!img) return;
  const canvas = document.getElementById('canvas');
  canvas.width = img.width;
  canvas.height = img.height;
  const ctx = canvas.getContext('2d');

  ctx.drawImage(img, 0, 0);

  regions.forEach((r, idx) => {
    const color = COLORS[idx % COLORS.length];
    const isHovered = r === hoveredRegion;
    const isSelected = r === selectedRegion;
    const { x, y } = r.bounds;
    // rotated 리전은 atlas에서 w↔h가 바뀌어 저장됨
    const w = r.rotated ? r.bounds.h : r.bounds.w;
    const h = r.rotated ? r.bounds.w : r.bounds.h;
    const cx = x + w / 2, cy = y + h / 2;

    // outline (항상 atlas 좌표 기준)
    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth = isHovered || isSelected ? 2.5 : 1;
    ctx.globalAlpha = isHovered || isSelected ? 1 : 0.55;
    if (r.rotated) ctx.setLineDash([5, 3]);
    ctx.strokeRect(x + 0.5, y + 0.5, w, h);
    ctx.setLineDash([]);
    ctx.restore();

    if (r.rotated) {
      if (isHovered || isSelected) {
        // atlas에 저장된 원본(sw×sh)을 -90° 회전해서 display box(w×h)에 그리기
        // sw = r.bounds.w, sh = r.bounds.h
        const sw = r.bounds.w, sh = r.bounds.h;
        ctx.save();
        ctx.translate(x, y + sw); // display box 좌하단
        ctx.rotate(-Math.PI / 2);
        ctx.globalAlpha = 1;
        ctx.drawImage(img, x, y, sw, sh, 0, 0, sw, sh);
        ctx.restore();

        ctx.fillStyle = color;
        ctx.globalAlpha = 0.25;
        ctx.fillRect(x, y, w, h);
      }

      // 라벨: display box 기준 그냥 그리기 (회전 없음)
      ctx.globalAlpha = isHovered || isSelected ? 1 : 0.7;
      ctx.fillStyle = color;
      const fontSize = Math.max(9, Math.min(13, w / 6));
      ctx.font = `${fontSize}px monospace`;
      ctx.fillText(r.name + ' ↻', x + 2, y + fontSize + 1);
    } else {
      if (isHovered || isSelected) {
        ctx.fillStyle = color;
        ctx.globalAlpha = 0.15;
        ctx.fillRect(x, y, w, h);
      }

      ctx.globalAlpha = isHovered || isSelected ? 1 : 0.7;
      ctx.fillStyle = color;
      const fontSize = Math.max(9, Math.min(13, w / 6));
      ctx.font = `${fontSize}px monospace`;
      ctx.fillText(r.name, x + 2, y + fontSize + 1);
    }

    ctx.globalAlpha = 1;
  });

  ctx.globalAlpha = 1;
}

const canvas = document.getElementById('canvas');
const tooltip = document.getElementById('tooltip');

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;

  hoveredRegion = null;
  for (let i = regions.length - 1; i >= 0; i--) {
    const r = regions[i];
    const { x, y } = r.bounds;
    const w = r.rotated ? r.bounds.h : r.bounds.w;
    const h = r.rotated ? r.bounds.w : r.bounds.h;
    if (mx >= x && mx <= x + w && my >= y && my <= y + h) {
      hoveredRegion = r;
      break;
    }
  }

  if (hoveredRegion) {
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 12) + 'px';
    tooltip.style.top = (e.clientY - 4) + 'px';
    const r = hoveredRegion;
    const tw = r.rotated ? r.bounds.h : r.bounds.w;
    const th = r.rotated ? r.bounds.w : r.bounds.h;
    tooltip.textContent = `${r.name}  [${r.bounds.x}, ${r.bounds.y}, ${tw}×${th}]${r.rotated ? ' (rotated)' : ''}`;
  } else {
    tooltip.style.display = 'none';
  }
  render();
});

canvas.addEventListener('mouseleave', () => { hoveredRegion = null; tooltip.style.display = 'none'; render(); });
canvas.addEventListener('click', e => {
  if (hoveredRegion) { selectedRegion = selectedRegion === hoveredRegion ? null : hoveredRegion; render(); updateSidebarActive(); }
});
</script>
</body>
</html>
